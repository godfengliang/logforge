<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogForge - Log Sanitizer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: {
          50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0',
          400: '#4ade80', 500: '#22c55e', 600: '#16a34a',
          700: '#15803d', 900: '#14532d',
        }
      }
    }
  }
}
</script>
<style>
  body { background: #0f172a; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #1e293b; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #64748b; }

  .line-numbers {
    counter-reset: line;
    padding: 0.75rem 0;
    user-select: none;
  }
  .line-numbers .ln {
    counter-increment: line;
    display: block;
    padding: 0 0.75rem;
    text-align: right;
    color: #475569;
    font-size: 0.8rem;
    line-height: 1.5rem;
    min-height: 1.5rem;
  }
  .line-numbers .ln::before { content: counter(line); }

  .log-textarea {
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    font-size: 0.85rem;
    line-height: 1.5rem;
    tab-size: 2;
    resize: none;
  }

  .diff-del { background: rgba(239, 68, 68, 0.2); color: #fca5a5; text-decoration: line-through; border-radius: 2px; }
  .diff-ins { background: rgba(34, 197, 94, 0.2); color: #86efac; border-radius: 2px; }

  .output-area {
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    font-size: 0.85rem;
    line-height: 1.5rem;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .toggle-chip {
    transition: all 0.15s ease;
  }
  .toggle-chip.active {
    background: rgba(34, 197, 94, 0.15);
    border-color: #22c55e;
    color: #86efac;
  }
  .toggle-chip.inactive {
    background: rgba(71, 85, 105, 0.1);
    border-color: #475569;
    color: #94a3b8;
  }

  .stat-badge {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sanitize-btn {
    background: linear-gradient(135deg, #16a34a, #22c55e);
    transition: all 0.2s ease;
  }
  .sanitize-btn:hover {
    background: linear-gradient(135deg, #15803d, #16a34a);
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
  }
  .sanitize-btn:active { transform: scale(0.98); }

  .toast {
    animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>
<body class="h-full text-slate-300 flex flex-col overflow-hidden">

<!-- Toast Container -->
<div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

<!-- Header -->
<header class="flex-shrink-0 border-b border-slate-700/50 px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
    <div>
      <h1 class="text-lg font-bold text-white tracking-tight">LogForge</h1>
      <p class="text-xs text-slate-500">Paste your log, we'll sanitize it</p>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <span class="text-xs text-slate-600">100% local processing</span>
    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
  </div>
</header>

<!-- Main Content -->
<main class="flex-1 flex flex-col overflow-hidden min-h-0">

  <!-- Editor Panels -->
  <div class="flex-1 flex min-h-0 overflow-hidden">

    <!-- Input Panel -->
    <div class="flex-1 flex flex-col border-r border-slate-700/50 min-w-0">
      <div class="flex-shrink-0 px-4 py-2 border-b border-slate-800 flex items-center justify-between">
        <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Input</span>
        <div class="flex items-center gap-2">
          <span id="inputLineCount" class="text-xs text-slate-600">0 lines</span>
          <button onclick="clearInput()" class="text-xs text-slate-500 hover:text-slate-300 px-2 py-0.5 rounded hover:bg-slate-700/50">Clear</button>
          <button onclick="loadSample()" class="text-xs text-slate-500 hover:text-slate-300 px-2 py-0.5 rounded hover:bg-slate-700/50">Sample</button>
        </div>
      </div>
      <div class="flex-1 flex overflow-hidden min-h-0">
        <div id="inputLineNums" class="line-numbers flex-shrink-0 overflow-hidden bg-slate-900/50 border-r border-slate-800"></div>
        <textarea id="inputArea" class="log-textarea flex-1 bg-transparent text-slate-300 p-3 outline-none placeholder-slate-600"
          placeholder="Paste your log here...&#10;&#10;Supported formats:&#10;  Application logs (JSON, text)&#10;  Server access logs&#10;  Stack traces&#10;  Debug output&#10;&#10;Press Ctrl+Enter to sanitize"
          spellcheck="false" oninput="updateLineNumbers()" onscroll="syncScroll(this, 'inputLineNums')"></textarea>
      </div>
    </div>

    <!-- Output Panel -->
    <div class="flex-1 flex flex-col min-w-0">
      <div class="flex-shrink-0 px-4 py-2 border-b border-slate-800 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Output</span>
          <div class="flex rounded-md overflow-hidden border border-slate-700">
            <button id="btnSanitized" onclick="setViewMode('sanitized')" class="text-xs px-2.5 py-0.5 bg-slate-700 text-white">Sanitized</button>
            <button id="btnDiff" onclick="setViewMode('diff')" class="text-xs px-2.5 py-0.5 text-slate-400 hover:text-slate-200">Diff</button>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span id="outputLineCount" class="text-xs text-slate-600">0 lines</span>
          <button onclick="copyOutput()" class="text-xs text-slate-500 hover:text-slate-300 px-2 py-0.5 rounded hover:bg-slate-700/50">Copy</button>
          <button onclick="downloadOutput()" class="text-xs text-slate-500 hover:text-slate-300 px-2 py-0.5 rounded hover:bg-slate-700/50">Download</button>
        </div>
      </div>
      <div class="flex-1 overflow-auto min-h-0">
        <div id="outputArea" class="output-area p-3 min-h-full text-slate-500">
          <span class="italic">Sanitized output will appear here...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Panel: Toggles, Custom Patterns, Stats -->
  <div class="flex-shrink-0 border-t border-slate-700/50 bg-slate-900/80">

    <!-- Sanitize Button -->
    <div class="px-6 py-3 flex items-center gap-4">
      <button onclick="sanitize()" class="sanitize-btn text-white font-semibold px-8 py-2.5 rounded-lg text-sm flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        Sanitize
      </button>
      <button onclick="toggleAll(true)" class="text-xs text-slate-500 hover:text-slate-300 px-3 py-1.5 rounded border border-slate-700 hover:border-slate-500">Select All</button>
      <button onclick="toggleAll(false)" class="text-xs text-slate-500 hover:text-slate-300 px-3 py-1.5 rounded border border-slate-700 hover:border-slate-500">Deselect All</button>

      <!-- Stats Badges -->
      <div id="statsContainer" class="flex items-center gap-2 ml-auto flex-wrap"></div>
    </div>

    <!-- Pattern Toggles -->
    <div class="px-6 pb-3">
      <div class="flex items-center gap-1.5 mb-2">
        <span class="text-xs text-slate-500">Patterns:</span>
      </div>
      <div id="patternToggles" class="flex flex-wrap gap-1.5"></div>
    </div>

    <!-- Custom Pattern -->
    <div class="px-6 pb-3">
      <div class="flex items-center gap-1.5 mb-2">
        <span class="text-xs text-slate-500">Custom Patterns:</span>
      </div>
      <div id="customPatterns" class="flex flex-wrap gap-2 mb-2"></div>
      <div class="flex items-center gap-2">
        <input id="customRegex" type="text" placeholder="Regex pattern (e.g. password:\s*\S+)"
          class="log-textarea text-xs bg-slate-800 border border-slate-700 rounded px-3 py-1.5 flex-1 outline-none focus:border-green-600 placeholder-slate-600">
        <input id="customReplace" type="text" placeholder="Replacement (e.g. password: [REDACTED])"
          class="log-textarea text-xs bg-slate-800 border border-slate-700 rounded px-3 py-1.5 flex-1 outline-none focus:border-green-600 placeholder-slate-600">
        <button onclick="addCustomPattern()" class="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-4 py-1.5 rounded border border-slate-600">Add</button>
      </div>
    </div>
  </div>
</main>

<script>
// ============================================================
// LogForge - Log Sanitizer
// All processing is local. Nothing leaves the browser.
// ============================================================

const PATTERNS = [
  {
    id: 'ipv4',
    label: 'IP Addresses',
    icon: 'IPv4',
    regex: /\b(?:(?:25[0-5]|2[0-4]\d|[01]?\d\d?)\.){3}(?:25[0-5]|2[0-4]\d|[01]?\d\d?)\b/g,
    replace: (m, ctx) => `10.0.0.${ctx.next('ip')}`
  },
  {
    id: 'email',
    label: 'Email Addresses',
    icon: 'Email',
    regex: /\b[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}\b/g,
    replace: (m, ctx) => `user${ctx.next('email')}@example.com`
  },
  {
    id: 'phone',
    label: 'Phone Numbers',
    icon: 'Phone',
    regex: /(?:\+?1[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}\b/g,
    replace: (m, ctx) => `555-${String(ctx.next('phone')).padStart(4, '0')}`
  },
  {
    id: 'cnphone',
    label: 'Chinese Phone',
    icon: 'CN Phone',
    regex: /(?<!\d)1[3-9]\d{2}[-\s]?\d{4}[-\s]?\d{4}(?!\d)/g,
    replace: (m, ctx) => { const n = ctx.next('cnphone'); return `1XX-${String(n).padStart(4,'0')}-${String(n).padStart(4,'0')}`; }
  },
  {
    id: 'cnid',
    label: 'Chinese ID',
    icon: 'CN ID',
    regex: /(?<!\d)[1-9]\d{5}(?:19|20)\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])\d{3}[\dXx](?!\d)/g,
    replace: (m, ctx) => { const n = String(ctx.next('cnid')).padStart(4,'0'); return `11010119900101${n}X`; }
  },
  {
    id: 'apikey',
    label: 'API Keys',
    icon: 'API Key',
    regex: /(?:sk-[a-zA-Z0-9]{20,}|key_[a-zA-Z0-9]{16,}|token_[a-zA-Z0-9]{16,}|bearer\s+[a-zA-Z0-9\-_.]{20,})/gi,
    replace: (m, ctx) => `[REDACTED_API_KEY_${ctx.next('apikey')}]`
  },
  {
    id: 'cc',
    label: 'Credit Cards',
    icon: 'Card',
    regex: /\b(?:\d[ -]*?){13,19}\b/g,
    replace: (m, ctx) => {
      const cleaned = m.replace(/[\s\-]/g, '');
      if (/^\d{13,19}$/.test(cleaned) && luhnCheck(cleaned)) {
        return `XXXX-XXXX-XXXX-${String(ctx.next('cc')).padStart(4, '0')}`;
      }
      return m;
    }
  },
  {
    id: 'urlparams',
    label: 'URL Query Params',
    icon: 'URL',
    regex: /https?:\/\/[^\s<>"{}|\\^`[\]]+\?[^\s<>"{}|\\^`[\]]+/gi,
    replace: (m, ctx) => sanitizeUrl(m, ctx)
  },
  {
    id: 'jwt',
    label: 'JWT Tokens',
    icon: 'JWT',
    regex: /eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+/g,
    replace: (m, ctx) => `[REDACTED_JWT_${ctx.next('jwt')}]`
  },
  {
    id: 'aws',
    label: 'AWS Keys',
    icon: 'AWS',
    regex: /AKIA[0-9A-Z]{16}/g,
    replace: (m, ctx) => `AKIA[REDACTED${ctx.next('aws')}]`
  },
  {
    id: 'privkey',
    label: 'Private Keys',
    icon: 'Key',
    regex: /-----BEGIN\s+(?:RSA\s+)?PRIVATE\s+KEY-----[\s\S]*?-----END\s+(?:RSA\s+)?PRIVATE\s+KEY-----/g,
    replace: (m, ctx) => `[REDACTED_PRIVATE_KEY_${ctx.next('privkey')}]`
  }
];

const SENSITIVE_PARAMS = ['password','passwd','pwd','token','secret','key','api_key','apikey',
  'access_token','refresh_token','auth','credential','session','session_id','sessionid',
  'private','ssid','authorization','card','cc','cvv','ssn'];

let patternState = {};
let customPatterns = [];
let sanitizedText = '';
let originalText = '';
let viewMode = 'sanitized';

// Initialize pattern toggles
function init() {
  PATTERNS.forEach(p => patternState[p.id] = true);
  renderToggles();
  updateLineNumbers();
}

function renderToggles() {
  const container = document.getElementById('patternToggles');
  container.innerHTML = PATTERNS.map(p => {
    const active = patternState[p.id];
    return `<button class="toggle-chip ${active ? 'active' : 'inactive'} text-xs px-3 py-1 rounded-full border"
      onclick="togglePattern('${p.id}')" title="${p.label}">
      ${p.icon}
    </button>`;
  }).join('');
}

function togglePattern(id) {
  patternState[id] = !patternState[id];
  renderToggles();
}

function toggleAll(state) {
  PATTERNS.forEach(p => patternState[p.id] = state);
  renderToggles();
}

// Custom patterns
function addCustomPattern() {
  const regexInput = document.getElementById('customRegex');
  const replaceInput = document.getElementById('customReplace');
  const regexStr = regexInput.value.trim();
  const replaceStr = replaceInput.value.trim() || '[REDACTED]';

  if (!regexStr) return;
  try {
    new RegExp(regexStr);
  } catch (e) {
    showToast('Invalid regex pattern', 'error');
    return;
  }

  const id = 'custom_' + Date.now();
  customPatterns.push({ id, regex: regexStr, replace: replaceStr });
  regexInput.value = '';
  replaceInput.value = '';
  renderCustomPatterns();
}

function removeCustomPattern(id) {
  customPatterns = customPatterns.filter(p => p.id !== id);
  renderCustomPatterns();
}

function renderCustomPatterns() {
  const container = document.getElementById('customPatterns');
  container.innerHTML = customPatterns.map(p => {
    const esc = p.regex.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<span class="inline-flex items-center gap-1 text-xs bg-slate-800 border border-slate-700 text-slate-400 px-2 py-1 rounded">
      <code>${esc}</code>
      <span class="text-slate-600">&rarr;</span>
      <code>${p.replace.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code>
      <button onclick="removeCustomPattern('${p.id}')" class="ml-1 text-slate-600 hover:text-red-400">&times;</button>
    </span>`;
  }).join('');
}

// Line numbers
function updateLineNumbers() {
  const textarea = document.getElementById('inputArea');
  const lines = textarea.value.split('\n');
  const lineNums = document.getElementById('inputLineNums');
  lineNums.innerHTML = lines.map(() => '<span class="ln"></span>').join('');
  document.getElementById('inputLineCount').textContent = `${lines.length} line${lines.length !== 1 ? 's' : ''}`;
}

function syncScroll(source, targetId) {
  document.getElementById(targetId).scrollTop = source.scrollTop;
}

// View mode
function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('btnSanitized').className = `text-xs px-2.5 py-0.5 ${mode === 'sanitized' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-slate-200'}`;
  document.getElementById('btnDiff').className = `text-xs px-2.5 py-0.5 ${mode === 'diff' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-slate-200'}`;
  renderOutput();
}

// Core sanitization
function sanitize() {
  const input = document.getElementById('inputArea').value;
  if (!input.trim()) {
    showToast('Nothing to sanitize', 'error');
    return;
  }

  originalText = input;
  const ctx = newContext();
  let text = input;

  // Run built-in patterns
  PATTERNS.forEach(p => {
    if (!patternState[p.id]) return;
    const re = new RegExp(p.regex.source, p.regex.flags);
    text = text.replace(re, (match) => {
      ctx.counts[p.id] = (ctx.counts[p.id] || 0) + 1;
      return p.replace(match, ctx);
    });
  });

  // Run custom patterns
  customPatterns.forEach((cp, idx) => {
    try {
      const re = new RegExp(cp.regex, 'g');
      text = text.replace(re, (match) => {
        const cid = `custom_${idx}`;
        ctx.counts[cid] = (ctx.counts[cid] || 0) + 1;
        return cp.replace;
      });
    } catch (e) { /* skip invalid */ }
  });

  sanitizedText = text;
  renderOutput();
  renderStats(ctx.counts);

  const total = Object.values(ctx.counts).reduce((a, b) => a + b, 0);
  document.getElementById('outputLineCount').textContent = `${text.split('\n').length} lines`;
  showToast(`Sanitized ${total} sensitive item${total !== 1 ? 's' : ''}`, 'success');
}

function newContext() {
  const counters = {};
  return {
    counters,
    counts: {},
    next(type) {
      counters[type] = (counters[type] || 0) + 1;
      return counters[type];
    }
  };
}

// URL sanitizer
function sanitizeUrl(url, ctx) {
  try {
    const qIdx = url.indexOf('?');
    if (qIdx === -1) return url;
    const base = url.substring(0, qIdx);
    const query = url.substring(qIdx + 1);
    const pairs = query.split('&');
    const clean = [];
    for (const pair of pairs) {
      const [key] = pair.split('=');
      const kLower = key.toLowerCase();
      const isSensitive = SENSITIVE_PARAMS.some(s => kLower.includes(s));
      if (isSensitive) {
        clean.push(`${key}=[REDACTED]`);
      } else {
        clean.push(pair);
      }
    }
    return base + '?' + clean.join('&');
  } catch {
    return `[REDACTED_URL_${ctx.next('url')}]`;
  }
}

// Luhn check for credit cards
function luhnCheck(num) {
  let sum = 0;
  let alt = false;
  for (let i = num.length - 1; i >= 0; i--) {
    let n = parseInt(num[i], 10);
    if (alt) {
      n *= 2;
      if (n > 9) n -= 9;
    }
    sum += n;
    alt = !alt;
  }
  return sum % 10 === 0;
}

// Render output
function renderOutput() {
  const container = document.getElementById('outputArea');
  if (!sanitizedText) {
    container.innerHTML = '<span class="italic text-slate-500">Sanitized output will appear here...</span>';
    return;
  }

  if (viewMode === 'sanitized') {
    container.innerHTML = escHtml(sanitizedText);
  } else {
    container.innerHTML = renderDiff(originalText, sanitizedText);
  }
}

function renderDiff(orig, sanitized) {
  const origLines = orig.split('\n');
  const saneLines = sanitized.split('\n');
  const maxLen = Math.max(origLines.length, saneLines.length);
  let html = '';

  for (let i = 0; i < maxLen; i++) {
    const o = origLines[i] || '';
    const s = saneLines[i] || '';
    if (o === s) {
      html += `<div class="min-h-[1.5rem]">${escHtml(s)}</div>`;
    } else {
      // Character-level diff for the line
      const diffs = lineDiff(o, s);
      html += '<div class="min-h-[1.5rem]">';
      for (const d of diffs) {
        if (d.type === 'same') {
          html += escHtml(d.text);
        } else if (d.type === 'del') {
          html += `<span class="diff-del">${escHtml(d.text)}</span>`;
        } else {
          html += `<span class="diff-ins">${escHtml(d.text)}</span>`;
        }
      }
      html += '</div>';
    }
  }
  return html;
}

function lineDiff(a, b) {
  // Simple LCS-based diff
  const result = [];
  let i = 0, j = 0;
  const la = a.length, lb = b.length;

  // Use a simple greedy approach for common prefix/suffix, then mark middle
  let prefixLen = 0;
  while (prefixLen < la && prefixLen < lb && a[prefixLen] === b[prefixLen]) prefixLen++;

  let suffixLen = 0;
  while (suffixLen < la - prefixLen && suffixLen < lb - prefixLen &&
         a[la - 1 - suffixLen] === b[lb - 1 - suffixLen]) suffixLen++;

  if (prefixLen > 0) result.push({ type: 'same', text: a.substring(0, prefixLen) });

  const aMid = a.substring(prefixLen, la - suffixLen);
  const bMid = b.substring(prefixLen, lb - suffixLen);

  if (aMid || bMid) {
    if (aMid) result.push({ type: 'del', text: aMid });
    if (bMid) result.push({ type: 'ins', text: bMid });
  }

  if (suffixLen > 0) result.push({ type: 'same', text: a.substring(la - suffixLen) });

  return result;
}

// Statistics
function renderStats(counts) {
  const container = document.getElementById('statsContainer');
  const badges = [];

  PATTERNS.forEach(p => {
    const c = counts[p.id] || 0;
    if (c > 0) {
      badges.push(`<span class="stat-badge inline-flex items-center gap-1 text-xs bg-slate-800 border border-slate-700 text-slate-300 px-2 py-0.5 rounded-full">
        <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
        ${p.icon}: ${c}
      </span>`);
    }
  });

  customPatterns.forEach((cp, idx) => {
    const c = counts[`custom_${idx}`] || 0;
    if (c > 0) {
      badges.push(`<span class="stat-badge inline-flex items-center gap-1 text-xs bg-slate-800 border border-slate-700 text-slate-300 px-2 py-0.5 rounded-full">
        <span class="w-1.5 h-1.5 rounded-full bg-yellow-500"></span>
        Custom: ${c}
      </span>`);
    }
  });

  container.innerHTML = badges.join('');
}

// Utility
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function clearInput() {
  document.getElementById('inputArea').value = '';
  updateLineNumbers();
  sanitizedText = '';
  originalText = '';
  renderOutput();
  document.getElementById('statsContainer').innerHTML = '';
  document.getElementById('outputLineCount').textContent = '0 lines';
}

function copyOutput() {
  if (!sanitizedText) { showToast('Nothing to copy', 'error'); return; }
  navigator.clipboard.writeText(sanitizedText).then(() => {
    showToast('Copied to clipboard', 'success');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = sanitizedText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard', 'success');
  });
}

function downloadOutput() {
  if (!sanitizedText) { showToast('Nothing to download', 'error'); return; }
  const blob = new Blob([sanitizedText], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sanitized-log-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('File downloaded', 'success');
}

function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const color = type === 'success' ? 'bg-green-900/90 text-green-200 border-green-700' : 'bg-red-900/90 text-red-200 border-red-700';
  const el = document.createElement('div');
  el.className = `toast ${color} text-sm px-4 py-2 rounded-lg border shadow-lg`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}
